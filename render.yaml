services:
  - type: web
    name: gamearena-api
    runtime: node
    rootDir: backend/api
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gamearena-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYHERO_API_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: ADMIN_URL
        value: https://gamearena-admin.onrender.com

  - type: web
    name: gamearena-admin
    runtime: node
    rootDir: backend/dashboard
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://gamearena-api.onrender.com

  - type: pg
    name: gamearena-db
    plan: free
